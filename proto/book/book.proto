syntax = "proto3";

package book;

option go_package = "github.com/GoSMRiST/protosLibary/gen/go/book;book";

service Book {
  rpc CheckAvailability (CheckRequest) returns (CheckResponse);
}

message CheckRequest {
  string author = 1;
  string title = 2;
}

message CheckResponse {
  bool result = 1;
}