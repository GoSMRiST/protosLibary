syntax = "proto3";

package reserv;

option go_package = "github.com/GoSMRiST/protosLibary/gen/go/reserv;reserv";

service Reserv {
  rpc ReservBook (ReservRequest) returns (ReservResponse);
  rpc ReturnBook (ReturnRequest) returns (ReturnResponse);
  rpc CheckReservation (CheckReservRequest)  returns (CheckReservResponse);
}

message ReservRequest {
  int64 user_id = 1;
  string author = 2;
  string title = 3;
}

message ReservResponse {
  bool result = 1;
}

message ReturnRequest {
  int64 user_id = 1;
  string author = 2;
  string title = 3;
}

message ReturnResponse {
  bool result = 1;
}

message Reservation {
  int64 reservation_id = 1;
  int64 user_id = 2;
  string author = 3;
  string title = 4;
  string taken_at = 5;
  string return_at = 6;
}

message CheckReservRequest {
  int64 userID = 1;
}

message CheckReservResponse {
  repeated Reservation reservations = 1;
}